openapi: 3.0.3
info:
  title: AUK Lost + Found API
  description: REST API for the lost-and-found system (CPEG/CSIS445 Assignment 1, Theme 14).
  version: 1.0.0
servers:
  - url: http://localhost:3000/api
paths:
  /items:
    get:
      summary: List items
      parameters:
        - { name: type, in: query, schema: { type: string, enum: [lost, found] } }
        - { name: category, in: query, schema: { $ref: '#/components/schemas/Category' } }
        - { name: status, in: query, schema: { type: string, enum: [open, resolved] } }
        - { name: q, in: query, description: "Text search over title, description and location", schema: { type: string } }
      responses:
        '200':
          description: Array of items, newest first
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/Item' } }
        '400': { $ref: '#/components/responses/BadRequest' }
    post:
      summary: Report a lost or found item
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ItemInput' }
      responses:
        '201':
          description: Item created
          headers:
            Location: { schema: { type: string }, description: URL of the new item }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Item' }
        '400': { $ref: '#/components/responses/BadRequest' }
  /items/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: integer, minimum: 1 } }
    get:
      summary: Get one item
      responses:
        '200':
          description: The item
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Item' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      summary: Update an item (partial updates allowed)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ItemUpdate' }
      responses:
        '200':
          description: Updated item
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Item' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      summary: Delete an item
      responses:
        '204': { description: "Deleted, no content in the response" }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }
components:
  schemas:
    Category:
      type: string
      enum: [electronics, clothing, documents, keys, bags, jewelry, books, other]
    Item:
      type: object
      properties:
        id: { type: integer, readOnly: true }
        type: { type: string, enum: [lost, found] }
        title: { type: string }
        description: { type: string }
        category: { $ref: '#/components/schemas/Category' }
        location: { type: string }
        date: { type: string, format: date }
        status: { type: string, enum: [open, resolved] }
        contact_name: { type: string }
        contact_info: { type: string }
        created_at: { type: string, readOnly: true }
    ItemInput:
      type: object
      required: [type, title, category, location, date, contact_name, contact_info]
      properties:
        type: { type: string, enum: [lost, found] }
        title: { type: string, minLength: 1 }
        description: { type: string }
        category: { $ref: '#/components/schemas/Category' }
        location: { type: string, minLength: 1 }
        date: { type: string, format: date }
        contact_name: { type: string, minLength: 1 }
        contact_info: { type: string, minLength: 1 }
    ItemUpdate:
      description: Any subset of ItemInput fields, plus status.
      type: object
      properties:
        type: { type: string, enum: [lost, found] }
        title: { type: string, minLength: 1 }
        description: { type: string }
        category: { $ref: '#/components/schemas/Category' }
        location: { type: string, minLength: 1 }
        date: { type: string, format: date }
        status: { type: string, enum: [open, resolved] }
        contact_name: { type: string, minLength: 1 }
        contact_info: { type: string, minLength: 1 }
  responses:
    BadRequest:
      description: Invalid input
      content:
        application/json:
          schema:
            type: object
            properties:
              error: { type: string }
              errors: { type: array, items: { type: string } }
    NotFound:
      description: Item not found
      content:
        application/json:
          schema:
            type: object
            properties:
              error: { type: string }
