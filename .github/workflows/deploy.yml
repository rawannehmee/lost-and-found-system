# Optional CI/CD (encouraged in the assignment brief):
# on every push to main, copy the code to EC2 over SSH and restart the service.
# Repo secrets needed: EC2_HOST (public IP), EC2_SSH_KEY (private key content).
name: Deploy to EC2
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Copy files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "."
          target: "/home/ubuntu/lost-and-found-cloud"
          rm: false
      - name: Install dependencies and restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/lost-and-found-cloud
            npm ci --omit=dev
            sudo systemctl restart lostfound
